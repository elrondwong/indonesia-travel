<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980" role="img" aria-labelledby="title desc">
  <title id="title">兰州出发甘南与莲宝叶则摄影路线总览</title>
  <desc id="desc">兰州出发，经过夏河、甘加秘境、合作、扎尕那、郎木寺、若尔盖、唐克、阿坝县、莲宝叶则，再经合作或临夏返回兰州的九天摄影路线图。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7fbff"/>
      <stop offset="0.52" stop-color="#eef7ef"/>
      <stop offset="1" stop-color="#f8f2e8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#172033" flood-opacity=".16"/>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 Z" fill="#2459b8"/>
    </marker>
  </defs>

  <rect width="1600" height="980" fill="url(#bg)"/>
  <path d="M105 792 C250 710, 340 724, 460 650 C575 579, 640 483, 755 451 C887 414, 1002 464, 1110 386 C1228 300, 1310 215, 1480 180" fill="none" stroke="#d8e1ee" stroke-width="44" stroke-linecap="round" opacity=".65"/>
  <path d="M60 214 C245 184, 386 235, 540 190 C712 140, 850 86, 1020 134 C1166 176, 1298 246, 1545 228" fill="none" stroke="#ddebd6" stroke-width="70" stroke-linecap="round" opacity=".55"/>
  <path d="M126 824 C240 772, 360 756, 477 680 C600 600, 668 505, 784 472 C914 435, 1024 492, 1137 410 C1249 329, 1330 238, 1482 190" fill="none" stroke="#2459b8" stroke-width="9" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)"/>
  <path d="M1482 190 C1390 308, 1252 445, 1090 564 C920 690, 735 770, 545 833 C385 886, 254 880, 126 824" fill="none" stroke="#167348" stroke-width="7" stroke-linecap="round" stroke-dasharray="18 14" opacity=".9" marker-end="url(#arrow)"/>

  <g font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif">
    <text x="80" y="82" fill="#112a68" font-size="42" font-weight="800">兰州出发甘南 + 莲宝叶则摄影路线</text>
    <text x="82" y="126" fill="#59657a" font-size="22">9 天 8 晚推荐：先适应海拔，再把扎尕那和莲宝叶则各留完整窗口</text>

    <g filter="url(#shadow)">
      <rect x="78" y="178" width="330" height="136" rx="8" fill="#ffffff"/>
      <text x="104" y="218" fill="#167348" font-size="18" font-weight="800">路线原则</text>
      <text x="104" y="252" fill="#172033" font-size="20">不赶夜路，不硬塞景点</text>
      <text x="104" y="284" fill="#172033" font-size="20">扎尕那全天 + 莲宝叶则全天</text>
    </g>

    <g filter="url(#shadow)">
      <rect x="1118" y="766" width="392" height="134" rx="8" fill="#ffffff"/>
      <text x="1144" y="806" fill="#b7791f" font-size="18" font-weight="800">动态核验</text>
      <text x="1144" y="840" fill="#172033" font-size="20">机票/酒店按实际日期下单复核</text>
      <text x="1144" y="872" fill="#172033" font-size="20">门票以官方小程序和当日公告为准</text>
    </g>

    <g class="node" transform="translate(126 824)">
      <circle r="18" fill="#112a68"/>
      <rect x="-70" y="-118" width="180" height="74" rx="8" fill="#fff" filter="url(#shadow)"/>
      <text x="-50" y="-88" fill="#112a68" font-size="20" font-weight="800">D0/D9 兰州</text>
      <text x="-50" y="-58" fill="#59657a" font-size="16">进出 / 取车 / 还车</text>
    </g>

    <g class="node" transform="translate(300 740)">
      <circle r="18" fill="#2459b8"/>
      <rect x="-78" y="-128" width="210" height="90" rx="8" fill="#fff" filter="url(#shadow)"/>
      <text x="-54" y="-96" fill="#112a68" font-size="20" font-weight="800">D1 夏河</text>
      <text x="-54" y="-66" fill="#59657a" font-size="16">拉卜楞寺 / 桑科草原</text>
      <text x="-54" y="-40" fill="#167348" font-size="15">转经长廊 + 草原日落</text>
    </g>

    <g class="node" transform="translate(480 654)">
      <circle r="18" fill="#2459b8"/>
      <rect x="-70" y="-140" width="240" height="104" rx="8" fill="#fff" filter="url(#shadow)"/>
      <text x="-46" y="-106" fill="#112a68" font-size="20" font-weight="800">D2 甘加 / 合作</text>
      <text x="-46" y="-76" fill="#59657a" font-size="16">八角城 / 白石崖</text>
      <text x="-46" y="-50" fill="#167348" font-size="15">米拉日巴佛阁蓝调</text>
    </g>

    <g class="node" transform="translate(716 490)">
      <circle r="22" fill="#b7791f"/>
      <rect x="-114" y="-150" width="270" height="110" rx="8" fill="#fff" filter="url(#shadow)"/>
      <text x="-88" y="-114" fill="#112a68" font-size="22" font-weight="800">D3-D4 扎尕那</text>
      <text x="-88" y="-82" fill="#59657a" font-size="16">达日 / 业日 / 仙女滩</text>
      <text x="-88" y="-54" fill="#b7791f" font-size="16" font-weight="800">S 级：晨雾石城</text>
    </g>

    <g class="node" transform="translate(900 474)">
      <circle r="18" fill="#2459b8"/>
      <rect x="-30" y="-140" width="220" height="94" rx="8" fill="#fff" filter="url(#shadow)"/>
      <text x="-8" y="-106" fill="#112a68" font-size="20" font-weight="800">D5 郎木寺</text>
      <text x="-8" y="-76" fill="#59657a" font-size="16">红石崖 / 纳摩峡谷</text>
      <text x="-8" y="-50" fill="#167348" font-size="15">轻拍，不深徒步</text>
    </g>

    <g class="node" transform="translate(1095 430)">
      <circle r="18" fill="#2459b8"/>
      <rect x="-22" y="-142" width="250" height="96" rx="8" fill="#fff" filter="url(#shadow)"/>
      <text x="2" y="-108" fill="#112a68" font-size="20" font-weight="800">D5 花湖 / 唐克</text>
      <text x="2" y="-78" fill="#59657a" font-size="16">若尔盖湿地</text>
      <text x="2" y="-52" fill="#167348" font-size="15">黄河九曲第一湾日落</text>
    </g>

    <g class="node" transform="translate(1290 276)">
      <circle r="18" fill="#2459b8"/>
      <rect x="-54" y="42" width="228" height="88" rx="8" fill="#fff" filter="url(#shadow)"/>
      <text x="-30" y="76" fill="#112a68" font-size="20" font-weight="800">D6 阿坝县</text>
      <text x="-30" y="106" fill="#59657a" font-size="16">高海拔缓冲 / 补给</text>
    </g>

    <g class="node" transform="translate(1482 190)">
      <circle r="24" fill="#b7791f"/>
      <rect x="-284" y="-128" width="290" height="112" rx="8" fill="#fff" filter="url(#shadow)"/>
      <text x="-258" y="-90" fill="#112a68" font-size="22" font-weight="800">D7 莲宝叶则</text>
      <text x="-258" y="-58" fill="#59657a" font-size="16">扎尕尔措 / 高位观景台</text>
      <text x="-258" y="-30" fill="#b7791f" font-size="16" font-weight="800">S 级：石山湖泊 + 蓝调</text>
    </g>

    <text x="893" y="746" fill="#167348" font-size="20" font-weight="800">D8 返程分段：阿坝县 → 合作 / 临夏</text>
    <text x="742" y="790" fill="#59657a" font-size="18">虚线为返程，不加刚性景点，避免阿坝县直冲兰州疲劳驾驶</text>
  </g>
</svg>
